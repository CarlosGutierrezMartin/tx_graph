# Render Blueprint — deploys backend API + Celery worker
# Free tier: web service spins down after 15 min inactivity (cold starts ~30s)
# Databases (Postgres, Redis) created via Render dashboard

services:
  # --- Redis Instance ---
  - type: redis
    name: tx-graph-redis
    plan: free
    ipAllowList: []

  # --- FastAPI backend ---
  - type: web
    name: tx-graph-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tx-graph-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tx-graph-redis
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: AI_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: groq
      - key: AI_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    plan: free

  # --- Celery worker ---
  - type: worker
    name: tx-graph-worker
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker -l INFO -Q default
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tx-graph-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tx-graph-redis
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
    plan: free

databases:
  - name: tx-graph-db
    plan: free
    databaseName: graphdb
    user: graph
