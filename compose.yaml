services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: graph
      POSTGRES_PASSWORD: graph
      POSTGRES_DB: graphdb
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U graph -d graphdb" ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - neo4jdata:/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://graph:graph@postgres:5432/graphdb
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://graph:graph@postgres:5432/graphdb
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_started
    command: [ "celery", "-A", "app.worker.celery_app", "worker", "-l", "INFO", "-Q", "default" ]

volumes:
  pgdata:
  neo4jdata:
