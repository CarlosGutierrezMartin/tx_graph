# Render Blueprint — deploys backend API + Celery worker
# Free tier: web service spins down after 15 min inactivity (cold starts ~30s)
# Databases (Postgres, Redis) created via Render dashboard

services:
  # --- FastAPI backend ---
  - type: web
    name: tx-graph-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tx-graph-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tx-graph-redis
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: AI_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: INFO
    plan: free

  # --- Celery worker ---
  - type: worker
    name: tx-graph-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker -l INFO -Q default
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tx-graph-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tx-graph-redis
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
    plan: free

databases:
  - name: tx-graph-db
    plan: free
    databaseName: graphdb
    user: graph

  - name: tx-graph-redis
    plan: free
